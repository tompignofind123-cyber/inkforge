name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
      - "*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-beta.0"
        type: string
        required: true
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify desktop checks
        run: pnpm --filter @inkforge/desktop run verify:all

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: dist:win
            label: win
          - os: macos-latest
            target: dist:mac
            label: mac
          - os: ubuntu-latest
            target: dist:linux
            label: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate icons
        run: pnpm icons

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional signing secrets (leave unset for unsigned builds):
          # Windows : CSC_LINK / CSC_KEY_PASSWORD
          # macOS   : CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID /
          #           APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.tar.gz
            apps/desktop/release/latest*.yml
            apps/desktop/release/beta*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve tag metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            DRAFT="${{ github.event.inputs.draft }}"
          else
            TAG="${{ github.ref_name }}"
            DRAFT="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: false

      - name: Show artifact tree
        shell: bash
        run: |
          ls -R release-assets

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.tar.gz
            release-assets/**/*.yml
            release-assets/**/*.blockmap
