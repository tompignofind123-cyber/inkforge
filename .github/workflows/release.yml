name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-beta.0"
        type: string
        required: true
      draft:
        description: "Create as draft release (workflow_dispatch only)"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify desktop checks
        run: pnpm --filter @inkforge/desktop run verify:all

  build-win:
    name: Build Windows
    needs: verify
    runs-on: windows-2022
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Show commit and desktop build targets
        shell: pwsh
        run: |
          git rev-parse HEAD
          node -e "const p=require('./apps/desktop/package.json'); console.log('scripts.dist:ci:win=', p.scripts['dist:ci:win']); console.log('build.win.target=', JSON.stringify(p.build.win.target)); console.log('build.linux.target=', JSON.stringify(p.build.linux.target));"

      - name: Setup Python 3.11 (node-gyp)
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show Python version
        shell: pwsh
        run: |
          python --version
          "${{ steps.setup-python.outputs.python-path }}"

      - name: Export Python env for node-gyp
        shell: pwsh
        run: |
          "PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_python=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NODE_GYP_FORCE_PYTHON=${{ steps.setup-python.outputs.python-path }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "npm_config_msvs_version=2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure setuptools present for distutils shim
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools
          python -c "import sys,distutils; print(sys.version); print('distutils:', distutils.__file__)"

      - name: Pin npm python for node-gyp
        shell: pwsh
        run: |
          npm config set python "$env:PYTHON"
          npm config get python

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run dist:ci:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder,electron-rebuild

      - name: Show release files
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "apps/desktop/release") {
            Get-ChildItem -LiteralPath "apps/desktop/release" -Recurse | Select-Object FullName,Length
          } else {
            Write-Host "apps/desktop/release does not exist"
          }

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-win
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  build-mac:
    name: Build macOS
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Show commit and desktop build targets
        shell: bash
        run: |
          git rev-parse HEAD
          node -e "const p=require('./apps/desktop/package.json'); console.log('scripts.dist:ci:mac=', p.scripts['dist:ci:mac']); console.log('build.win.target=', JSON.stringify(p.build.win.target)); console.log('build.linux.target=', JSON.stringify(p.build.linux.target));"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run dist:ci:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder,electron-rebuild

      - name: Show release files
        if: always()
        shell: bash
        run: |
          if [ -d "apps/desktop/release" ]; then
            ls -lahR apps/desktop/release
          else
            echo "apps/desktop/release does not exist"
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux
    needs: verify
    runs-on: ubuntu-22.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Show commit and desktop build targets
        shell: bash
        run: |
          git rev-parse HEAD
          node -e "const p=require('./apps/desktop/package.json'); console.log('scripts.dist:ci:linux=', p.scripts['dist:ci:linux']); console.log('build.win.target=', JSON.stringify(p.build.win.target)); console.log('build.linux.target=', JSON.stringify(p.build.linux.target));"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run dist:ci:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder,electron-rebuild

      - name: Show release files
        if: always()
        shell: bash
        run: |
          if [ -d "apps/desktop/release" ]; then
            ls -lahR apps/desktop/release
          else
            echo "apps/desktop/release does not exist"
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Release
    needs: [build-win, build-mac, build-linux]
    # Tolerant publish: as long as Windows + Linux succeed, ship the release.
    # If macOS also succeeds its artifacts will be included automatically;
    # if macOS fails, is cancelled, or times out, we still publish Win+Linux
    # instead of leaving the Releases page empty.
    if: ${{ always() && needs.build-win.result == 'success' && needs.build-linux.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve tag metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            DRAFT="${{ github.event.inputs.draft }}"
          else
            TAG="${{ github.ref_name }}"
            DRAFT="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Show artifact tree
        shell: bash
        run: |
          ls -R release-assets

      - name: Verify files to publish
        shell: bash
        run: |
          COUNT_ALL=$(find release-assets -type f | wc -l)
          COUNT_INSTALLERS=$(find release-assets -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) | wc -l)
          echo "all_files=$COUNT_ALL"
          echo "installer_files=$COUNT_INSTALLERS"
          if [ "$COUNT_ALL" -eq 0 ]; then
            echo "No packaged artifacts found under release-assets"
            exit 1
          fi
          if [ "$COUNT_INSTALLERS" -eq 0 ]; then
            echo "Artifacts exist but no installer files were found"
            find release-assets -type f | sed -n '1,200p'
            exit 1
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.tar.gz
            release-assets/**/*.yml
            release-assets/**/*.blockmap
