name: Release

on:
  push:
    tags:
      - "*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-beta.0"
        type: string
        required: true
      draft:
        description: "Create as draft release (workflow_dispatch only)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Verify desktop checks
        run: pnpm --filter @inkforge/desktop run verify:all

  build-win:
    name: Build Windows
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run dist:ci:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder

      - name: Show release files
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "apps/desktop/release") {
            Get-ChildItem -LiteralPath "apps/desktop/release" -Recurse | Select-Object FullName,Length
          } else {
            Write-Host "apps/desktop/release does not exist"
          }

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  build-mac:
    name: Build macOS
    needs: verify
    runs-on: macos-13
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run dist:ci:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder

      - name: Show release files
        if: always()
        shell: bash
        run: |
          if [ -d "apps/desktop/release" ]; then
            ls -lahR apps/desktop/release
          else
            echo "apps/desktop/release does not exist"
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & package
        run: pnpm --filter @inkforge/desktop run dist:ci:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          DEBUG: electron-builder

      - name: Show release files
        if: always()
        shell: bash
        run: |
          if [ -d "apps/desktop/release" ]; then
            ls -lahR apps/desktop/release
          else
            echo "apps/desktop/release does not exist"
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.tar.gz
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Release
    needs: [build-win, build-mac, build-linux]
    if: ${{ always() && (needs.build-win.result == 'success' || needs.build-mac.result == 'success' || needs.build-linux.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve tag metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            DRAFT="${{ github.event.inputs.draft }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            DRAFT="${{ github.event.release.draft }}"
          else
            TAG="${{ github.ref_name }}"
            DRAFT="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Show artifact tree
        shell: bash
        run: |
          ls -R release-assets

      - name: Verify files to publish
        shell: bash
        run: |
          COUNT_ALL=$(find release-assets -type f | wc -l)
          COUNT_INSTALLERS=$(find release-assets -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) | wc -l)
          echo "all_files=$COUNT_ALL"
          echo "installer_files=$COUNT_INSTALLERS"
          if [ "$COUNT_ALL" -eq 0 ]; then
            echo "No packaged artifacts found under release-assets"
            exit 1
          fi
          if [ "$COUNT_INSTALLERS" -eq 0 ]; then
            echo "Artifacts exist but no installer files were found"
            find release-assets -type f | sed -n '1,200p'
            exit 1
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft == 'true' }}
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.tar.gz
            release-assets/**/*.yml
            release-assets/**/*.blockmap
