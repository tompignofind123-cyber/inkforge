<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="InkForge — 本地优先的 AI 写作工坊">
  <title>InkForge — local-first AI writing forge</title>
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f1c"/>
      <stop offset="55%" stop-color="#141728"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="0.18" cy="0.65" r="0.45">
      <stop offset="0%" stop-color="#ff7e3d" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ff7e3d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff7e3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="forge3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffb766"/>
      <stop offset="55%" stop-color="#ff7e3d"/>
      <stop offset="100%" stop-color="#c93b1f"/>
    </linearGradient>
    <linearGradient id="nib3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e1"/>
      <stop offset="100%" stop-color="#a09687"/>
    </linearGradient>
    <linearGradient id="word3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e1"/>
      <stop offset="100%" stop-color="#c8c0ad"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f48" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2a2f48" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a2f48" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#hero-bg)"/>
  <rect width="1280" height="360" fill="url(#hero-glow)"/>

  <!-- Faint grid lines (manuscript feel) -->
  <g stroke="url(#grid)" stroke-width="1">
    <line x1="0"   y1="80"  x2="1280" y2="80" />
    <line x1="0"   y1="180" x2="1280" y2="180"/>
    <line x1="0"   y1="280" x2="1280" y2="280"/>
  </g>

  <!-- Mark left -->
  <g transform="translate(76 60)">
    <rect x="0" y="0" width="240" height="240" rx="56" fill="#0d0f1c"/>
    <rect x="0" y="0" width="240" height="240" rx="56" fill="none" stroke="#2a2f48" stroke-width="2"/>

    <ellipse cx="120" cy="170" rx="78" ry="36" fill="url(#hero-glow)"/>

    <path d="M44 192
             L44 144
             Q44 88 120 88
             Q196 88 196 144
             L196 192 Z"
          fill="none" stroke="#3b4264" stroke-width="6" stroke-linejoin="round"/>
    <path d="M68 188
             L68 148
             Q68 112 120 112
             Q172 112 172 148
             L172 188 Z"
          fill="url(#forge3)" opacity="0.92"/>
    <rect x="32" y="192" width="176" height="14" rx="4" fill="#3b4264"/>
    <rect x="24" y="206" width="192" height="10" rx="3" fill="#2a2f48"/>

    <g transform="translate(120 108)">
      <path d="M0 -84 L20 -28 L14 0 L-14 0 L-20 -28 Z"
            fill="url(#nib3)" stroke="#1a1d2e" stroke-width="2.5" stroke-linejoin="round"/>
      <line x1="0" y1="-72" x2="0" y2="-4" stroke="#1a1d2e" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="0" cy="-22" r="3.6" fill="#1a1d2e"/>
      <path d="M0 6 Q-5 16 0 24 Q5 16 0 6 Z" fill="#1a1d2e"/>
    </g>

    <circle cx="84"  cy="130" r="2"   fill="#ffd9a8" opacity="0.9"/>
    <circle cx="162" cy="138" r="1.6" fill="#ffd9a8" opacity="0.8"/>
    <circle cx="140" cy="120" r="1.4" fill="#ffd9a8" opacity="0.7"/>
    <circle cx="100" cy="152" r="1.6" fill="#ffd9a8" opacity="0.7"/>
  </g>

  <!-- Wordmark right -->
  <g transform="translate(380 0)">
    <text x="0" y="158"
          font-family="ui-serif, Georgia, 'Iowan Old Style', 'Source Serif Pro', serif"
          font-weight="700"
          font-size="120"
          letter-spacing="2"
          fill="url(#word3)">InkForge</text>
    <text x="6" y="208"
          font-family="ui-sans-serif, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif"
          font-weight="500"
          font-size="32"
          letter-spacing="10"
          fill="#8a9bb8">墨 炉</text>

    <!-- Tagline lines -->
    <g transform="translate(6 244)">
      <text font-family="ui-sans-serif, system-ui, sans-serif"
            font-size="18"
            letter-spacing="1.5"
            fill="#9aa6c0">
        <tspan x="0" dy="0">A local-first AI writing forge for novelists.</tspan>
        <tspan x="0" dy="28" fill="#5d6789">编辑器居中 · AI 静默陪写 · 多模型可换 · Skill 可编程 · 数据本地化</tspan>
      </text>
    </g>
  </g>
</svg>
